<div id="loadingScreen" class="phase active">
    <div class="moonGlow"></div>
    <div class="stars"></div>
    <div class="shootingStar"></div>
    <div class="content">
        <h3 class="smallText">Some gifts are wrapped in paper...</h3>
        <h1 class="mainTitle">This one <span>was wrapped in stars.</span></h1>
        <p class="subtitle">Made especially for <strong>Geet ❤️</strong><br><br>by aman</p>
        <button id="startBtn">✨ Begin Journey ✨</button>
    </div>
</div>

<div id="storyScreen" class="phase hidden">
    <div class="stars layout-dim"></div>
    <div class="storyPage">
        <h1>Hello Geet ❤️</h1>
        <p id="storyText"></p>
        <button id="nextBtn" class="magic-btn" style="opacity: 0;">Continue ✨</button>
    </div>
</div>

<div id="birthdayRoom" class="phase hidden">
    <div class="balloons"></div>
    <canvas id="fireworksCanvas"></canvas> <h1 class="room-title">🎂 Happy Birthday Geet ❤️</h1>
    <p id="statusText">Decorate your birthday cake...</p>

    <div class="cake-container">
        <div class="cake">
            <div class="plate"></div>
            <div class="cake-base"></div>
            <div class="cake-middle"></div>
            <div class="cake-top"></div>
            <div class="icing"></div>
            <div class="drip drip1"></div>
            <div class="drip drip2"></div>
            <div class="drip drip3"></div>
            <div id="decorations-layer"></div>
            <div class="candles-grid hidden"></div>
        </div>
    </div>

    <div class="controls">
        <button class="deco-btn" data-item="🍒">🍒 Cherries</button>
        <button class="deco-btn" data-item="🍫">🍫 Chocolate</button>
        <button class="deco-btn" data-item="✨">✨ Sprinkles</button>
        <button class="deco-btn" data-item="🌸">🌸 Flowers</button>
    </div>
    
    <button id="actionBtn" class="magic-btn hidden">💨 Blow Candles</button>
</div>

<div id="giftScreen" class="phase hidden">
    <div class="gift-box-container">
        <div class="gift-box">
            <div class="gift-lid"></div>
            <div class="gift-body"></div>
        </div>
    </div>
    <div class="letter-wrapper hidden">
        <div class="letter">
            <h2>To My Favorite Person,</h2>
            <p>Write your beautiful heartfelt words here for Geet...</p>
            <p class="signature">With love, aman</p>
        </div>
    </div>
</div>
